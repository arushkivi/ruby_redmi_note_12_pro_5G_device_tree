name: Build OrangeFox (ruby)

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE:
        description: "Device Tree URL"
        required: true
        default: "https://github.com/arushkivi/ruby_redmi_note_12_pro_5G_device_tree"
      DEVICE_TREE_BRANCH:
        description: "Device Tree Branch"
        required: true
        default: "main"
      DEVICE_NAME:
        description: "Device Codename"
        required: true
        default: "ruby"
      ORANGEFOX_BRANCH:
        description: "OrangeFox Branch"
        required: true
        default: "fox_12.1"
      BUILD_TARGET:
        description: "Build Target"
        required: true
        default: "bootimage"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space (Aggressive)
        run: |
          echo "Before cleanup:"
          df -h
          # Remove large unnecessary packages
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/java
          sudo rm -rf /opt/az
          sudo rm -rf /opt/google
          sudo rm -rf /opt/microsoft
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/grub
          sudo rm -rf /usr/share/gradle*
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/share/man
          # Remove docker images
          docker rmi $(docker images -q) 2>/dev/null || true
          # Remove apt cache
          sudo apt-get remove -y \
            '^dotnet-.*' \
            '^llvm-.*' \
            '^mysql-.*' \
            'php.*' \
            azure-cli \
            google-cloud-sdk \
            powershell \
            mono-complete \
            2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "After cleanup:"
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev libc6-dev-i386 \
            libncurses5 libncurses5-dev x11proto-core-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig \
            python2 python-is-python2 python3 \
            libssl-dev bc lzop ccache \
            schedtool squashfs-tools \
            lzma liblzma-dev \
            pngcrush imagemagick \
            openjdk-11-jdk
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          python --version
          java -version

      - name: Install repo tool
        run: |
          mkdir -p /home/runner/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /home/runner/bin/repo
          chmod a+x /home/runner/bin/repo
          echo "/home/runner/bin" >> $GITHUB_PATH
          export PATH="/home/runner/bin:$PATH"
          repo --version

      - name: Set up Git identity
        run: |
          git config --global user.name "OrangeFox Builder"
          git config --global user.email "builder@orangefox.tech"
          git config --global advice.detachedHead false
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.compression 0
          git config --global url."https://".insteadOf git://

      - name: Set up CCache
        run: |
          export PATH="/home/runner/bin:$PATH"
          ccache -M 10G
          ccache -o compression=true
          ccache -o compression_level=1
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_EXEC=/usr/bin/ccache" >> $GITHUB_ENV

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-ruby-${{ github.sha }}
          restore-keys: |
            ccache-ruby-

      - name: Sync OrangeFox Source
        run: |
          export PATH="/home/runner/bin:$PATH"
          mkdir -p $GITHUB_WORKSPACE/workspace
          cd $GITHUB_WORKSPACE/workspace
          git clone https://gitlab.com/OrangeFox/sync.git --depth 1
          cd sync
          chmod +x orangefox_sync.sh
          ./orangefox_sync.sh \
            --branch ${{ github.event.inputs.ORANGEFOX_BRANCH }} \
            --path $GITHUB_WORKSPACE/workspace
        timeout-minutes: 90

      - name: Clone Device Tree
        run: |
          export PATH="/home/runner/bin:$PATH"
          cd $GITHUB_WORKSPACE/workspace
          git clone ${{ github.event.inputs.DEVICE_TREE }} \
            -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
            --depth 1 \
            device/xiaomi/${{ github.event.inputs.DEVICE_NAME }}
          echo "Device tree contents:"
          ls device/xiaomi/${{ github.event.inputs.DEVICE_NAME }}

      - name: Build OrangeFox
        run: |
          export PATH="/home/runner/bin:$PATH"
          cd $GITHUB_WORKSPACE/workspace
          /bin/bash << 'EOF'
          export PATH="/home/runner/bin:$PATH"
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=${{ github.event.inputs.DEVICE_NAME }}
          export LC_ALL="C"
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR=$HOME/.ccache
          export FOX_AB_DEVICE=1
          export FOX_VIRTUAL_AB_DEVICE=1
          export OF_PATCH_AVB20=1
          export OF_DEFAULT_KEYMASTER_VERSION=4.1
          export FOX_BUILD_USER="Arush"
          export FOX_MAINTAINER="Arush"
          source build/envsetup.sh
          lunch fox_${{ github.event.inputs.DEVICE_NAME }}-eng
          mka adbd ${{ github.event.inputs.BUILD_TARGET }} -j$(nproc --all) 2>&1 | tee build.log
          EOF
        timeout-minutes: 180

      - name: Upload Build Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ${{ github.workspace }}/workspace/build.log
          retention-days: 7

      - name: Upload OrangeFox Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-ruby-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img
            ${{ github.workspace }}/workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
          retention-days: 7
