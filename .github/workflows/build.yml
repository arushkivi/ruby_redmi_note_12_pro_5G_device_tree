name: Build OrangeFox (ruby)

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE:
        description: "Device Tree URL"
        required: true
        default: "https://github.com/arushkivi/ruby_redmi_note_12_pro_5G_device_tree"
      DEVICE_TREE_BRANCH:
        description: "Device Tree Branch"
        required: true
        default: "main"
      DEVICE_NAME:
        description: "Device Codename"
        required: true
        default: "ruby"
      ORANGEFOX_BRANCH:
        description: "OrangeFox Branch"
        required: true
        default: "12.1"
      BUILD_TARGET:
        description: "Build Target"
        required: true
        default: "bootimage"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Up Disk Space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          echo "After cleanup:"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev libc6-dev-i386 \
            libncurses5 libncurses5-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig \
            python2 \
            libssl-dev bc lzop ccache \
            schedtool squashfs-tools lzma
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          echo "Python version:"
          python --version

      - name: Install repo
        run: |
          mkdir -p /home/runner/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo \
            > /home/runner/bin/repo
          chmod +x /home/runner/bin/repo
          echo "/home/runner/bin" >> $GITHUB_PATH
          export PATH="/home/runner/bin:$PATH"
          echo "repo version:"
          repo --version

      - name: Configure Git
        run: |
          git config --global user.name "OrangeFox Builder"
          git config --global user.email "builder@orangefox.tech"
          git config --global advice.detachedHead false
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.compression 0

      - name: Sync OrangeFox Sources
        run: |
          set -e
          export PATH="/home/runner/bin:$PATH"
          echo "repo version:"
          repo --version
          echo "Disk space before sync:"
          df -h
          mkdir -p $GITHUB_WORKSPACE/workspace
          cd $GITHUB_WORKSPACE/workspace
          echo "Cloning sync script..."
          git clone https://gitlab.com/OrangeFox/sync.git
          echo "Sync script cloned!"
          ls sync/
          cd sync
          chmod +x orangefox_sync.sh
          echo "Starting OrangeFox sync - this takes 30-60 mins..."
          bash orangefox_sync.sh \
            --branch ${{ github.event.inputs.ORANGEFOX_BRANCH }} \
            --path $GITHUB_WORKSPACE/workspace
          echo "Verifying sync..."
          ls $GITHUB_WORKSPACE/workspace
          ls $GITHUB_WORKSPACE/workspace/build/
          echo "Sync complete and verified!"
        timeout-minutes: 90

      - name: Verify Sync
        run: |
          echo "Checking workspace contents..."
          ls $GITHUB_WORKSPACE/workspace
          echo "Checking build directory..."
          ls $GITHUB_WORKSPACE/workspace/build/
          echo "Checking envsetup.sh exists..."
          test -f $GITHUB_WORKSPACE/workspace/build/envsetup.sh && \
            echo "✅ envsetup.sh found!" || \
            echo "❌ envsetup.sh NOT found!"

      - name: Clone Device Tree
        run: |
          export PATH="/home/runner/bin:$PATH"
          cd $GITHUB_WORKSPACE/workspace
          echo "Cloning device tree..."
          git clone ${{ github.event.inputs.DEVICE_TREE }} \
            -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
            --depth 1 \
            device/xiaomi/${{ github.event.inputs.DEVICE_NAME }}
          echo "Device tree files:"
          ls device/xiaomi/${{ github.event.inputs.DEVICE_NAME }}

      - name: Build OrangeFox
        run: |
          export PATH="/home/runner/bin:$PATH"
          cd $GITHUB_WORKSPACE/workspace

          echo "========================================="
          echo "STEP 1: Checking envsetup.sh"
          echo "========================================="
          test -f build/envsetup.sh && echo "✅ found" || exit 1

          echo "========================================="
          echo "STEP 2: Printing vendorsetup.sh contents"
          echo "========================================="
          cat device/xiaomi/ruby/vendorsetup.sh

          echo "========================================="
          echo "STEP 3: Printing AndroidProducts.mk"
          echo "========================================="
          cat device/xiaomi/ruby/AndroidProducts.mk

          echo "========================================="
          echo "STEP 4: Printing twrp_ruby.mk"
          echo "========================================="
          cat device/xiaomi/ruby/twrp_ruby.mk || echo "❌ twrp_ruby.mk NOT FOUND"

          echo "========================================="
          echo "STEP 5: Printing device.mk"
          echo "========================================="
          cat device/xiaomi/ruby/device.mk

          echo "========================================="
          echo "STEP 6: Printing BoardConfig.mk"
          echo "========================================="
          cat device/xiaomi/ruby/BoardConfig.mk

          echo "========================================="
          echo "STEP 7: Sourcing envsetup.sh"
          echo "========================================="
          set +e
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=${{ github.event.inputs.DEVICE_NAME }}
          export LC_ALL="C"
          export FOX_AB_DEVICE=1
          export FOX_VIRTUAL_AB_DEVICE=1
          export OF_PATCH_AVB20=1
          export OF_DEFAULT_KEYMASTER_VERSION=4.1
          export FOX_BUILD_USER="Arush"
          export FOX_MAINTAINER="Arush"
          export FOX_MAINTAINER_PATCH_VERSION="1"
          source build/envsetup.sh
          ENVSETUP_RESULT=$?
          echo "envsetup exit code: $ENVSETUP_RESULT"
          set -e

          echo "========================================="
          echo "STEP 8: Running lunch"
          echo "========================================="
          set +e
          lunch twrp_ruby-eng
          LUNCH_RESULT=$?
          echo "lunch exit code: $LUNCH_RESULT"
          set -e

          if [ $LUNCH_RESULT -ne 0 ]; then
            echo "❌ LUNCH FAILED - checking available targets:"
            echo "Available lunch combos:"
            lunch 2>&1 | head -50 || true
            exit 1
          fi

          echo "========================================="
          echo "STEP 9: Starting build"
          echo "========================================="
          mka adbd ${{ github.event.inputs.BUILD_TARGET }} \
            -j$(nproc --all) 2>&1 | tee $GITHUB_WORKSPACE/workspace/build.log
        timeout-minutes: 180

      - name: Check Build Output
        if: always()
        run: |
          echo "=== Build Output Files ==="
          find $GITHUB_WORKSPACE/workspace/out/target/product/ \
            -name "*.img" -o -name "*.zip" 2>/dev/null || echo "No output files found"
          echo "=== Disk Usage ==="
          df -h

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ${{ github.workspace }}/workspace/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload OrangeFox Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-ruby-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img
            ${{ github.workspace }}/workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
          retention-days: 7
